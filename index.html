<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Shopify Token</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f4f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:40px;width:100%;max-width:480px}
h1{font-size:20px;font-weight:600;margin-bottom:16px}
p{font-size:14px;color:#6b7280;margin-bottom:24px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none}
.hint{font-size:11px;color:#9ca3af;margin-top:4px}
.btn{width:100%;padding:12px;border-radius:8px;border:none;background:#96BF48;color:white;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.token-box{background:#f0f7e6;border:2px solid #96BF48;border-radius:10px;padding:20px;margin-top:20px;display:none}
.token-value{font-family:monospace;font-size:13px;background:white;border:1px solid #c6e09a;border-radius:6px;padding:12px;word-break:break-all;margin-bottom:12px}
.copy-btn{background:#96BF48;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.error{background:#fef2f2;border:1.5px solid #fecaca;border-radius:8px;padding:14px;color:#991b1b;font-size:13px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="card">
<h1>🛍️ Shopify Token Generator</h1>
<div id="s">
<p>Entre les infos depuis Partners Dashboard → Claude → Paramètres.</p>
<div class="field"><label>Domaine</label><input id="store" placeholder="wj6cnb-ag.myshopify.com"/></div>
<div class="field"><label>Client ID</label><input id="cid" placeholder="2cd19845e971..."/><div class="hint">Partners Dashboard → Claude → Paramètres → ID client</div></div>
<div class="field"><label>Client Secret</label><input id="cs" type="password" placeholder="secret..."/><div class="hint">Partners Dashboard → Claude → Paramètres → Secret (clique sur l'œil)</div></div>
<button class="btn" onclick="go()">Connecter ma boutique →</button>
<div class="error" id="err"></div>
</div>
<div id="cb" style="display:none">
<p>Récupération du token...</p>
<div class="token-box" id="tb">
<h2 style="margin-bottom:10px">🎉 Ton token :</h2>
<div class="token-value" id="tv"></div>
<button class="copy-btn" onclick="cp()">Copier le token</button>
<p style="margin-top:10px;font-size:12px;color:#6b7280">Copie ce token et retourne sur Claude !</p>
</div>
<div class="error" id="cberr"></div>
</div>
</div>
<script>
function go(){
  var s=document.getElementById("store").value.trim().replace(/^https?:\/\//,"").replace(/\/$/,"");
  var c=document.getElementById("cid").value.trim();
  var x=document.getElementById("cs").value.trim();
  if(!s||!c||!x){var e=document.getElementById("err");e.style.display="block";e.textContent="Remplis tous les champs.";return;}
  sessionStorage.setItem("s",s);
  sessionStorage.setItem("x",x);
  sessionStorage.setItem("c",c);
  var r=encodeURIComponent(window.location.href.split("?")[0]);
  var sc="read_all_orders,write_orders,read_products,write_products,read_customers,write_customers,read_inventory,write_inventory,read_draft_orders,write_draft_orders,read_fulfillments,write_fulfillments,read_shipping,write_shipping,read_price_rules,write_price_rules,read_discounts,write_discounts,read_content,write_content,read_themes,write_themes,read_analytics,read_locations,read_reports,write_reports,read_gift_cards,write_gift_cards";
  var t=Math.random().toString(36).substring(2);
  sessionStorage.setItem("t",t);
  window.location.href="https://"+s+"/admin/oauth/authorize?client_id="+c+"&scope="+sc+"&redirect_uri="+r+"&state="+t;
}
async function hc(){
  var p=new URLSearchParams(window.location.search);
  var code=p.get("code");
  if(!code)return;
  document.getElementById("s").style.display="none";
  document.getElementById("cb").style.display="block";
  var x=sessionStorage.getItem("x");
  var c=sessionStorage.getItem("c");
  var s=sessionStorage.getItem("s")||p.get("shop");
  try{
    var res=await fetch("https://corsproxy.io/?url="+encodeURIComponent("https://"+s+"/admin/oauth/access_token"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:c,client_secret:x,code:code})});
    var d=await res.json();
    if(d.access_token){
      document.getElementById("tb").style.display="block";
      document.getElementById("tv").textContent=d.access_token;
      window.history.replaceState({},"",window.location.pathname);
    }else{
      var e=document.getElementById("cberr");e.style.display="block";e.textContent=JSON.stringify(d);
    }
  }catch(e){
    var el=document.getElementById("cberr");el.style.display="block";el.textContent=e.message;
  }
}
function cp(){navigator.clipboard.writeText(document.getElementById("tv").textContent).then(function(){document.querySelector(".copy-btn").textContent="✓ Copié !";});}
if(window.location.search.includes("code="))hc();
</script>
</body>
</html>
